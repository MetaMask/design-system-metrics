name: Weekly Design System Metrics

on:
  schedule:
    # Run every Friday at 4:00 PM UTC (8:00 AM PST / 11:00 AM EST)
    - cron: '0 16 * * 5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Update git submodules
        run: yarn update-repos

      - name: Sync config
        run: yarn sync-config

      - name: Generate extension metrics
        run: yarn start

      - name: Generate mobile metrics
        run: yarn start:mobile

      - name: Generate Slack report
        run: yarn slack-report --output slack-report.md

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: weekly metrics update ${{ steps.date.outputs.date }}

            - Updated git submodules to latest versions
            - Regenerated component metrics for extension and mobile
            - Updated config.json with latest component mappings
            - Generated weekly Slack report

            🤖 Automated weekly update
          branch: weekly-metrics-${{ steps.date.outputs.date }}
          delete-branch: true
          title: 'Weekly Metrics Update - ${{ steps.date.outputs.date }}'
          body: |
            ## Weekly Design System Metrics Update

            This PR contains the automated weekly metrics update for ${{ steps.date.outputs.date }}.

            ### Changes
            - ✅ Updated git submodules (Extension, Mobile, MMDS)
            - ✅ Synced config.json with latest component mappings
            - ✅ Generated extension metrics spreadsheet
            - ✅ Generated mobile metrics spreadsheet
            - ✅ Generated Slack report markdown

            ### Slack Report

            ```markdown
            $(cat slack-report.md)
            ```

            ### Files Updated
            - `config.json` - Component mappings
            - `metrics/extension-component-metrics-${{ steps.date.outputs.date }}.xlsx`
            - `metrics/mobile-component-metrics-${{ steps.date.outputs.date }}.xlsx`
            - `slack-report.md`
            - Git submodules updated to latest commits

            🤖 This PR was automatically generated by GitHub Actions
          labels: |
            automation
            metrics
            weekly-update
          assignees: georgewrmarshall
