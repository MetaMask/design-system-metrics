name: Weekly Design System Metrics

on:
  schedule:
    # Run every Friday at 4:00 PM UTC (8:00 AM PST / 11:00 AM EST)
    - cron: '0 16 * * 5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Initialize git submodules
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git submodule update --init --recursive || true

      - name: Update git submodules
        run: |
          cd repos/metamask-extension && git fetch origin && git checkout main && git pull origin main && cd ../..
          cd repos/metamask-mobile && git fetch origin && git checkout main && git pull origin main && cd ../..
          cd repos/metamask-design-system && git fetch origin && git checkout main && git pull origin main && cd ../..
          git add repos/

      - name: Sync config
        run: yarn sync-config

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Generate extension metrics
        run: yarn start

      - name: Generate mobile metrics
        run: yarn start:mobile

      - name: Generate Slack report
        run: yarn slack-report --output metrics/slack-report-${{ steps.date.outputs.date }}.md

      - name: Extract JSON from XLSX
        run: yarn extract-json

      - name: Update timeline data
        run: yarn update-timeline

      - name: Copy metrics to dashboard
        run: cp metrics/*.json dashboard/public/metrics/

      - name: Install dashboard dependencies
        run: |
          cd dashboard
          npm ci

      - name: Build dashboard
        run: |
          cd dashboard
          npm run build

      - name: Commit and push changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "chore: weekly metrics update ${{ steps.date.outputs.date }}

          - Updated git submodules to latest versions
          - Regenerated component metrics for extension and mobile
          - Updated config.json with latest component mappings
          - Generated weekly Slack report
          - Updated dashboard data and rebuilt

          🤖 Automated weekly update" || echo "No changes to commit"
          git push origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard/dist
          cname: false
